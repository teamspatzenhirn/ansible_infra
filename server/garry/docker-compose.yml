services:
  gitlab:
    # https://gitlab-com.gitlab.io/support/toolbox/upgrade-path/
    image: gitlab/gitlab-ce:18.8.4-ce.0
    container_name: gitlab
    restart: always
    hostname: git.spatz.wtf
    stop_grace_period: 45s
    ports:
      - "80:80"
      - "443:443"
      - "22:22"
      - "5050:5050"
    volumes:
      - config:/etc/gitlab
      - logs:/var/log/gitlab
      - data:/var/opt/gitlab
    environment:
      KANIDM_GITLAB_OAUTH_SECRET: $KANIDM_GITLAB_OAUTH_SECRET
      
  postfix:
    image: postfix
    build:
      context: ../postfix
      dockerfile: Dockerfile
    container_name: postfix
    restart: always
    environment:
      - RELAYHOST=smtp.uni-ulm.de
      - RELAYPORT=25
      - MYNETWORKS=0.0.0.0/0

volumes:
  config:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/gitlab-data/config"
  logs:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/gitlab-data/logs"
  data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/gitlab-data/data"
